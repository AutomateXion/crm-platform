server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    resolver 8.8.8.8 valid=30s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Core API  (/api/v1/... -> core)
    location /api/ {
        proxy_pass https://crm-platform-enwv.onrender.com/api/;
        proxy_http_version 1.1;
        proxy_set_header Host crm-platform-enwv.onrender.com;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Sales API  (/sales-api/... -> sales, prefix stripped)
    location /sales-api/ {
        proxy_pass https://automatexion-crm-sales.onrender.com/;
        proxy_http_version 1.1;
        proxy_set_header Host automatexion-crm-sales.onrender.com;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # PM API  (/pm-api/... -> pm, prefix stripped)
    location /pm-api/ {
        proxy_pass https://automatexion-crm-pm.onrender.com/;
        proxy_http_version 1.1;
        proxy_set_header Host automatexion-crm-pm.onrender.com;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}
