<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #0f1923; color: #e0e0e0; overflow: hidden; height: 100vh; }
#header { background: #1a2940; padding: 10px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 2px solid #2d5086; z-index: 100; position: relative; }
#header h1 { font-size: 18px; color: #7eb3ff; font-weight: 700; }
#header span { font-size: 12px; color: #888; }
#controls { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
.btn { padding: 5px 12px; border-radius: 6px; border: 1px solid #2d5086; background: #1f3a5f; color: #7eb3ff; cursor: pointer; font-size: 12px; transition: all 0.2s; }
.btn:hover, .btn.active { background: #2d5086; color: #fff; }
.btn.reset { border-color: #555; color: #aaa; background: #1a2535; }
#legend { display: flex; gap: 12px; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; }
.leg-dot { width: 12px; height: 12px; border-radius: 3px; }
#canvas { width: 100vw; height: calc(100vh - 52px); }
svg { width: 100%; height: 100%; }
.table-group .header rect { rx: 6; ry: 6; }
.table-group text { pointer-events: none; }
.link { stroke-opacity: 0.5; fill: none; stroke-width: 1.5; }
.link:hover { stroke-opacity: 1; stroke-width: 2.5; }
.link.highlighted { stroke-opacity: 1; stroke-width: 3; }
.table-group { cursor: grab; }
.table-group:active { cursor: grabbing; }
.table-group.highlighted .card { filter: drop-shadow(0 0 8px rgba(126,179,255,0.8)); }
.table-group.dimmed { opacity: 0.2; }
.link.dimmed { opacity: 0.05; }
#tooltip { position: fixed; background: #1a2940; border: 1px solid #2d5086; border-radius: 8px; padding: 10px 14px; font-size: 12px; pointer-events: none; display: none; z-index: 999; max-width: 280px; }
#tooltip .tt-title { font-weight: 700; color: #7eb3ff; margin-bottom: 6px; font-size: 13px; }
#tooltip .tt-row { display: flex; justify-content: space-between; gap: 12px; margin: 2px 0; }
#tooltip .tt-key { color: #aaa; }
#tooltip .tt-val { color: #fff; font-weight: 600; }
#search { padding: 4px 10px; border-radius: 6px; border: 1px solid #2d5086; background: #0f1923; color: #e0e0e0; font-size: 12px; width: 160px; }
#search::placeholder { color: #555; }
#info { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); background: rgba(26,41,64,0.9); border: 1px solid #2d5086; border-radius: 8px; padding: 6px 16px; font-size: 11px; color: #888; }
</style>
</head>

<div id="header">

  {s:'stock_transfer_items',sc:'from_location_id',t:'warehouse_locations',tc:'location_id'},
  {s:'stock_transfer_items',sc:'to_location_id',t:'warehouse_locations',tc:'location_id'},
  {s:'stock_transfers',sc:'from_warehouse_id',t:'warehouses',tc:'warehouse_id'},
  {s:'stock_transfers',sc:'to_warehouse_id',t:'warehouses',tc:'warehouse_id'},
  {s:'suppliers',sc:'account_id',t:'accounts',tc:'account_id'},
  {s:'cheque_books',sc:'bank_account_id',t:'bank_accounts',tc:'bank_account_id'},
  {s:'cheque_leaves',sc:'cheque_book_id',t:'cheque_books',tc:'cheque_book_id'},
  {s:'cheque_leaves',sc:'bank_account_id',t:'bank_accounts',tc:'bank_account_id'},
  {s:'users',sc:'user_group_id',t:'user_groups',tc:'user_group_id'},
  {s:'permissions',sc:'user_group_id',t:'user_groups',tc:'user_group_id'},
  {s:'fields',sc:'page_id',t:'pages',tc:'page_id'},
  {s:'pages',sc:'sub_module_id',t:'sub_modules',tc:'sub_module_id'},
  {s:'sub_modules',sc:'module_id',t:'modules',tc:'module_id'},
  {s:'permissions',sc:'module_id',t:'modules',tc:'module_id'},
  {s:'master_categories',sc:'module_id',t:'modules',tc:'module_id'},
  {s:'warehouse_locations',sc:'warehouse_id',t:'warehouses',tc:'warehouse_id'},
  {s:'password_reset_tokens',sc:'user_id',t:'users',tc:'user_id'},
  {s:'recurring_expense_log',sc:'recurring_id',t:'recurring_expenses',tc:'recurring_id'},
];

// Layout: initial positions by group
const POSITIONS = {
  // Core (top center)
  tenants:{x:900,y:80}, users:{x:700,y:80}, user_groups:{x:500,y:80}, user_sessions:{x:300,y:80},
  permissions:{x:1100,y:80}, modules:{x:1300,y:80}, sub_modules:{x:1500,y:80}, pages:{x:1700,y:80},
  fields:{x:1900,y:80}, master_categories:{x:2100,y:80}, master_values:{x:2300,y:80}, document_configs:{x:2500,y:80},
  // CRM (left)
  accounts:{x:80,y:300}, contacts:{x:80,y:460}, leads:{x:80,y:620}, opportunities:{x:80,y:780},
  opportunity_items:{x:80,y:940}, customer_visits:{x:80,y:1100}, activities:{x:80,y:1260}, suppliers:{x:80,y:1420},
  // Sales/Finance (center-left)
  quotations:{x:480,y:300}, quotation_items:{x:480,y:460}, delivery_notes:{x:480,y:620},
  delivery_note_items:{x:480,y:780}, sales_invoices:{x:480,y:940}, sales_invoice_items:{x:480,y:1100},
  receipts:{x:480,y:1260}, sales_returns:{x:480,y:1420}, sales_return_items:{x:480,y:1580},
  chart_of_accounts:{x:720,y:300}, journal_vouchers:{x:720,y:460}, journal_voucher_lines:{x:720,y:620},
  exchange_rates:{x:720,y:780}, einvoice_settings:{x:720,y:940}, einvoice_certificates:{x:720,y:1100},
  einvoice_submissions:{x:720,y:1260}, sales_targets:{x:720,y:1420},
  // Purchase (center-right)
  purchase_orders:{x:1100,y:300}, purchase_order_items:{x:1100,y:460}, goods_receipt_notes:{x:1100,y:620},
  goods_receipt_note_items:{x:1100,y:780}, purchase_invoices:{x:1100,y:940}, purchase_invoice_items:{x:1100,y:1100},
  payment_vouchers:{x:1100,y:1260}, purchase_returns:{x:1100,y:1420}, purchase_return_items:{x:1100,y:1580},
  po_asset_units:{x:1100,y:1740},
  // Inventory/WH (right-center)
  products:{x:1500,y:300}, stock_movements:{x:1500,y:460}, product_warehouse_stock:{x:1500,y:620},
  warehouses:{x:1500,y:780}, warehouse_locations:{x:1500,y:940}, stock_transfers:{x:1500,y:1100},
  stock_transfer_items:{x:1500,y:1260}, stock_adjustments:{x:1500,y:1420}, stock_adjustment_items:{x:1500,y:1580},
  consumable_stock:{x:1500,y:1740}, consumable_transactions:{x:1500,y:1900}, document_signatures:{x:1500,y:2060},
  // Assets (right)
  fixed_assets:{x:1900,y:300}, asset_depreciation:{x:1900,y:460}, asset_maintenance:{x:1900,y:620},
  asset_transfers:{x:1900,y:780}, asset_brands:{x:1900,y:940},
  // Bank (far right)
  bank_accounts:{x:2300,y:300}, cheque_books:{x:2300,y:460}, cheque_leaves:{x:2300,y:620},
  // PM (bottom right)
  pm_projects:{x:2100,y:780}, pm_tasks:{x:2100,y:940}, pm_milestones:{x:2100,y:1100},
  pm_stages:{x:2100,y:1260}, pm_risks:{x:2100,y:1420}, pm_meetings:{x:2100,y:1580},
  pm_resources:{x:2300,y:780}, pm_budget_entries:{x:2300,y:940}, pm_change_requests:{x:2300,y:1100},
  pm_task_comments:{x:2500,y:780}, pm_task_documents:{x:2500,y:940},
};

function getGroup(t) {
  for (const [g, d] of Object.entries(GROUPS)) if (d.tables.includes(t)) return g;
  return 'core';
}
function getColor(t) { return GROUPS[getGroup(t)]?.color || '#333'; }
function getHeader(t) { return GROUPS[getGroup(t)]?.header || '#1a1a1a'; }

const W = 200, H_HDR = 26, H_ROW = 18;
function tableHeight(name) { return H_HDR + (TABLE_FIELDS[name]?.length || 3) * H_ROW + 6; }

const svg = d3.select('#svg');
const g = svg.append('g');

// Zoom
const zoom = d3.zoom().scaleExtent([0.05, 2]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

// Defs for arrow markers
const defs = svg.append('defs');
const mkArrow = (id, color) => defs.append('marker').attr('id',id).attr('viewBox','0 -5 10 10').attr('refX',8).attr('refY',0).attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto').append('path').attr('d','M0,-5L10,0L0,5').attr('fill',color);
mkArrow('arrow','#4a7ab5');
mkArrow('arrow-hi','#7eb3ff');

const nodes = [];
for (const [name, pos] of Object.entries(POSITIONS)) {
  nodes.push({ name, x: pos.x, y: pos.y });
}

// Draw links
const linkG = g.append('g').attr('class','links');
const linkEls = linkG.selectAll('.link').data(LINKS).enter().append('path')
  .attr('class','link')
  .attr('stroke', d => getColor(d.s))
  .attr('marker-end','url(#arrow)')
  .attr('id', (d,i) => 'link'+i);

// Draw tables
const tooltip = document.getElementById('tooltip');
let activeNode = null;

const nodeEls = g.selectAll('.table-group').data(nodes).enter().append('g')
  .attr('class','table-group')
  .attr('transform', d => `translate(${d.x},${d.y})`)
  .call(d3.drag()
    .on('start', function(e,d) { d3.select(this).raise(); })
    .on('drag', function(e,d) {
      d.x += e.dx; d.y += e.dy;
      d3.select(this).attr('transform',`translate(${d.x},${d.y})`);
      updateLinks();
    })
  )
  .on('click', function(e,d) {
    e.stopPropagation();
    if (activeNode === d.name) {
      clearHighlight();
    } else {
      highlightTable(d.name);
    }
  })
  .on('mouseover', function(e,d) {
    tooltip.style.display = 'block';
    const fields = TABLE_FIELDS[d.name] || [];
    const grp = getGroup(d.name);
    tooltip.innerHTML = `<div class="tt-title">📋 ${d.name}</div>
      <div class="tt-row"><span class="tt-key">Group</span><span class="tt-val" style="color:${getColor(d.name)}">${grp.toUpperCase()}</span></div>
      <div class="tt-row"><span class="tt-key">Fields</span><span class="tt-val">${fields.length}</span></div>
      <div style="margin-top:6px;font-size:11px;color:#aaa">${fields.slice(0,6).join('<br>')}</div>
      ${fields.length>6?`<div style="color:#666;font-size:10px">...and ${fields.length-6} more</div>`:''}`;
  })
  .on('mousemove', e => { tooltip.style.left=(e.clientX+14)+'px'; tooltip.style.top=(e.clientY-10)+'px'; })
  .on('mouseleave', () => { tooltip.style.display='none'; });

// Card background
nodeEls.append('rect').attr('class','card')
  .attr('width',W).attr('height',d=>tableHeight(d.name))
  .attr('rx',8).attr('ry',8)
  .attr('fill','#141e2c').attr('stroke',d=>getColor(d.name)).attr('stroke-width',1.5);

// Header
nodeEls.append('rect').attr('class','header')
  .attr('width',W).attr('height',H_HDR)
  .attr('rx',8).attr('ry',8)
  .attr('fill',d=>getHeader(d.name));

nodeEls.append('rect').attr('y',H_HDR-8).attr('width',W).attr('height',10).attr('fill',d=>getHeader(d.name));

// Table name
nodeEls.append('text').attr('x',W/2).attr('y',H_HDR-8)
  .attr('text-anchor','middle').attr('dominant-baseline','hanging')
  .attr('fill','#ffffff').attr('font-size',11).attr('font-weight',700)
  .attr('y', 8)
  .text(d=>d.name);

// Fields
nodeEls.each(function(d) {
  const fields = TABLE_FIELDS[d.name] || [];
  const el = d3.select(this);
  fields.forEach((f,i) => {
    const isPK = f.includes('(PK)');
    const isFK = f.includes('(FK)');
    el.append('text')
      .attr('x', 8).attr('y', H_HDR + 4 + i*H_ROW + H_ROW/2)
      .attr('dominant-baseline','middle')
      .attr('fill', isPK ? '#ffd700' : isFK ? '#7eb3ff' : '#aaaaaa')
      .attr('font-size', 10)
      .attr('font-family','Courier New')
      .text(f.length > 26 ? f.slice(0,25)+'…' : f);
  });
});

function updateLinks() {
  linkEls.attr('d', d => {
    const sn = nodes.find(n=>n.name===d.s);
    const tn = nodes.find(n=>n.name===d.t);
    if (!sn || !tn) return '';
    const sx = sn.x + W, sy = sn.y + H_HDR/2;
    const tx = tn.x, ty = tn.y + H_HDR/2;
    const mx = (sx+tx)/2;
    return `M${sx},${sy} C${mx},${sy} ${mx},${ty} ${tx},${ty}`;
  });
}

function highlightTable(name) {
  activeNode = name;
  const related = new Set([name]);
  LINKS.forEach(l => { if(l.s===name||l.t===name) { related.add(l.s); related.add(l.t); }});
  nodeEls.classed('highlighted', d => related.has(d.name));
  nodeEls.classed('dimmed', d => !related.has(d.name));
  linkEls.classed('highlighted', d => d.s===name||d.t===name);
  linkEls.classed('dimmed', d => d.s!==name&&d.t!==name);
  linkEls.attr('marker-end', d => (d.s===name||d.t===name)?'url(#arrow-hi)':'url(#arrow)');
  linkEls.attr('stroke', d => (d.s===name||d.t===name)?'#7eb3ff':getColor(d.s));
}

function clearHighlight() {
  activeNode = null;
  nodeEls.classed('highlighted dimmed', false);
  linkEls.classed('highlighted dimmed', false);
  linkEls.attr('marker-end','url(#arrow)');
  linkEls.attr('stroke', d => getColor(d.s));
}

svg.on('click', clearHighlight);

function filterGroup(grp) {
  if (grp === 'all') {
    nodeEls.style('display','block');
    linkEls.style('display','block');
  } else {
    const visible = GROUPS[grp]?.tables || [];
    nodeEls.style('display', d => visible.includes(d.name) ? 'block' : 'none');
    linkEls.style('display', d => visible.includes(d.s) || visible.includes(d.t) ? 'block' : 'none');
  }
  clearHighlight();
}

document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { nodeEls.style('opacity',1); return; }
  nodeEls.style('opacity', d => d.name.includes(q) ? 1 : 0.1);
  if (q.length > 2) {
    const exact = nodes.find(n=>n.name.includes(q));
    if (exact) highlightTable(exact.name);
  }
});

function resetView() {
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(0,0).scale(0.3));
  clearHighlight();
}

updateLinks();
// Initial zoom to fit
setTimeout(() => {
  svg.call(zoom.transform, d3.zoomIdentity.translate(20,20).scale(0.28));
}, 100);
</script>
</body>
</html>
